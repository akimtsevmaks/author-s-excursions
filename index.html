<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свои места — авторские экскурсии</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<button id="debugMailToggle" class="debug-toggle" type="button" role="switch" aria-checked="false" title="Отключить реальную отправку писем (дебаг)">
  <span class="debug-toggle-thumb"></span>
</button>

<header>
  <div class="header-in">
    <button class="logo" id="logoBtn" type="button"><span class="dot"></span>Свои&nbsp;места</button>
    <button class="citybtn" id="cityBtn" type="button">📍 <span id="cityLabel">—</span></button>
    <nav>
      <button id="nav-catalog" type="button">Каталог</button>
      <button id="nav-bookings" type="button">Мои брони</button>
      <button id="nav-requests" type="button">Заявки гидам <span class="badge-count hidden" id="reqBadge"></span></button>
      <button id="nav-mail" type="button">Почта <span class="badge-count hidden" id="mailBadge"></span></button>
    </nav>
  </div>
</header>

<main id="app"></main>
<button class="fab" id="fabBtn" type="button"><span class="plus">✚</span> Создать экскурсию</button>

<div class="modal-back hidden" id="modalBack"></div>
<div id="toast"></div>

<template id="tpl-city-modal">
  <div class="modal" role="dialog" aria-modal="true">
    <h3>Где вы сейчас?</h3>
    <p>При первом открытии показываем экскурсии в вашем городе. Город можно сменить в любой момент.</p>
    <div class="field mb-16">
      <label for="cityPick">Город</label>
      <select id="cityPick"></select>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-ghost" id="cityCancelBtn" type="button">Отмена</button>
      <button class="btn btn-primary" id="cityPickBtn" type="button">Выбрать</button>
    </div>
  </div>
</template>

<template id="tpl-catalog">
  <div class="hero">
    <div class="eyebrow">Авторские экскурсии от местных</div>
    <h1>Город глазами того, <em>кто здесь живёт</em></h1>
    <p>Маршруты придумывают не турфирмы, а местные жители и гиды. Выбирайте, бронируйте — и после подтверждения гид свяжется с вами напрямую.</p>
  </div>

  <section class="filter" aria-label="Фильтр экскурсий">
    <div class="filter-grid">
      <div class="field"><label for="f-country">Страна</label>
        <input id="f-country" list="dl-country" placeholder="Любая">
        <datalist id="dl-country"></datalist></div>
      <div class="field"><label for="f-city">Город</label>
        <input id="f-city" list="dl-city" placeholder="Любой">
        <datalist id="dl-city"></datalist></div>
      <div class="field"><label for="f-from">Даты с</label><input type="date" id="f-from"></div>
      <div class="field"><label for="f-to">Даты по</label><input type="date" id="f-to"></div>
      <div class="field"><label for="f-people">Человек</label><input type="number" id="f-people" min="1" placeholder="Сколько вас"></div>
      <div class="field"><label for="f-kids">Дети</label>
        <select id="f-kids">
          <option value="any">Не важно</option>
          <option value="yes">Идём с детьми</option>
        </select></div>
      <div class="filter-actions">
        <button class="btn btn-primary" id="searchBtn" type="button">Поиск</button>
        <button class="btn btn-ghost hidden" id="resetBtn" type="button">Сброс</button>
      </div>
    </div>
  </section>

  <div class="results-meta" id="resultsMeta"></div>
  <div class="cards" id="cardsContainer"></div>
  <div class="empty hidden" id="emptyState"><b>Здесь пока пусто</b>Попробуйте изменить фильтр — или создайте первую экскурсию в этом городе сами.</div>
</template>

<template id="tpl-ticket-card">
  <article class="ticket" role="button" tabindex="0">
    <div class="photo" data-field="photo"></div>
    <span class="notch top"></span><span class="notch bot"></span>
    <div class="info">
      <span class="stamp" data-field="stamp"></span>
      <h3 data-field="name"></h3>
      <div class="desc" data-field="desc"></div>
      <div class="meta-row">
        <span>📍 <span data-field="city"></span></span>
        <span>⏱ <span data-field="duration"></span></span>
        <span>💰 <span data-field="priceValue"></span> <b data-field="priceUnit"></b></span>
        <span>🖼 фото: <span data-field="photoCount"></span></span>
      </div>
    </div>
  </article>
</template>

<template id="tpl-detail">
  <button class="back" id="backBtn" type="button">← Назад к каталогу</button>
  <article class="detail">
    <div class="gallery" id="gallery"></div>
    <div class="detail-body">
      <div>
        <span class="stamp stamp-static" data-field="stamp"></span>
        <h2 data-field="name"></h2>
        <div class="place" data-field="place"></div>
        <div class="fulltext" data-field="full"></div>
      </div>
      <div>
        <div class="spec">
          <div><span>Формат</span><span data-field="format"></span></div>
          <div><span>Длительность</span><span data-field="duration"></span></div>
          <div data-row="groupSize"><span>Размер группы</span><span data-field="groupSize"></span></div>
          <div><span>Дети</span><span data-field="kids"></span></div>
          <div><span>Передвижение</span><span data-field="transport"></span></div>
        </div>
        <div class="price-big"><span data-field="priceValue"></span><small data-field="priceUnit"></small></div>
      </div>
    </div>
  </article>

  <section class="panel" aria-label="Бронирование">
    <h3>Бронирование</h3>
    <div data-block="withSlots">
      <div class="field"><label>Выберите время</label></div>
      <div class="slots" id="slotsContainer"></div>
      <div class="hint mb-14">Гид предложил эти даты — выберите удобную.</div>
    </div>
    <div class="hint mb-14" data-block="noSlots">Эта экскурсия проходит в свободном формате — конкретное время выбирать не нужно, гид свяжется с вами после подтверждения.</div>

    <div class="form-grid mb-14">
      <div class="field"><label for="b-people">Количество человек</label>
        <input type="number" id="b-people" min="1">
        <div class="hint hidden" id="groupSizeHint"></div></div>
      <div class="field"><label for="b-email">Ваша почта</label>
        <input type="email" id="b-email" placeholder="you@example.com">
        <div class="hint">Сюда придёт подтверждение и контакты гида</div></div>
    </div>
    <div class="field mb-8"><label>Способ оплаты</label></div>
    <div class="pay-opts mb-18">
      <button class="pay" id="payOnline" type="button">
        <b>💳 Оплатить онлайн</b><span>Интернет-эквайринг (демо-режим)</span></button>
      <button class="pay" id="payOnsite" type="button">
        <b>🤝 Оплата на месте</b><span>Наличными или переводом гиду</span></button>
    </div>
    <button class="btn btn-primary btn-block" id="submitBookingBtn" type="button">Забронировать</button>
  </section>
</template>

<template id="tpl-slot-button"><button class="slot" type="button"></button></template>

<template id="tpl-pay-modal">
  <div class="modal" role="dialog" aria-modal="true">
    <h3>Оплата онлайн</h3>
    <p>Демо-режим интернет-эквайринга: реального списания не произойдёт.</p>
    <div class="spec mb-18">
      <div><span>Экскурсия</span><span data-field="name"></span></div>
      <div><span>Участников</span><span data-field="people"></span></div>
      <div><span>К оплате</span><span data-field="total"></span></div>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-ghost" id="payCancelBtn" type="button">Отмена</button>
      <button class="btn btn-primary" id="payBtn" type="button">Оплатить <span data-field="totalBtn"></span></button>
    </div>
  </div>
</template>

<template id="tpl-bookings">
  <h2 class="section-title">Мои бронирования</h2>
  <div id="bookingsList"></div>
  <div class="empty hidden" id="emptyState"><b>Бронирований пока нет</b>Выберите экскурсию в каталоге — бронирование займёт минуту.</div>
</template>

<template id="tpl-booking-item">
  <div class="list-item">
    <div class="grow">
      <h4 data-field="name"></h4>
      <div class="kv">
        <div data-field="time"></div>
        <div>Участников: <b data-field="people"></b> · Оплата: <b data-field="pay"></b></div>
        <div>Почта: <b data-field="email"></b> · Оформлено: <span data-field="createdAt"></span></div>
      </div>
    </div>
    <span class="status" data-field="status"></span>
  </div>
</template>

<template id="tpl-mail">
  <h2 class="section-title">Почта</h2>
  <p class="hint section-hint">Демо-почтовый ящик: сюда приходят письма, которые сервис отправляет на указанный при бронировании адрес.</p>
  <div id="mailList"></div>
  <div class="empty hidden" id="emptyState"><b>Писем пока нет</b>Забронируйте экскурсию — подтверждение придёт сюда.</div>
</template>

<template id="tpl-letter">
  <div class="letter">
    <div class="head">
      <b data-field="subject"></b>
      <span class="to" data-field="to"></span>
    </div>
    <div class="body" data-field="body"></div>
  </div>
</template>

<template id="tpl-requests">
  <h2 class="section-title">Заявки гидам</h2>
  <p class="hint section-hint">Демо-кабинет создателя экскурсий: здесь гид видит новые бронирования и подтверждает их. После подтверждения путешественнику на почту уходят контакты гида.</p>
  <div id="requestsList"></div>
  <div class="empty hidden" id="emptyState"><b>Заявок пока нет</b>Как только кто-то забронирует экскурсию, заявка появится здесь.</div>
</template>

<template id="tpl-request-item">
  <div class="list-item">
    <div class="grow">
      <h4 data-field="name"></h4>
      <div class="kv">
        <div data-field="time"></div>
        <div>Участников: <b data-field="people"></b> · Оплата: <b data-field="pay"></b></div>
        <div>Почта гостя: <b data-field="email"></b></div>
      </div>
    </div>
    <div class="request-actions" data-block="pending">
      <button class="btn btn-primary mini" data-action="approve" type="button">Подтвердить</button>
      <button class="btn btn-danger mini" data-action="reject" type="button">Отклонить</button>
    </div>
    <span class="status hidden" data-block="decided"></span>
  </div>
</template>

<template id="tpl-create">
  <button class="back" id="backBtn" type="button">← Назад к каталогу</button>
  <h2 class="section-title">Создать экскурсию</h2>
  <section class="panel mt-0">
    <div class="form-grid">
      <div class="field wide"><label for="c-name">Название экскурсии *</label>
        <input id="c-name" maxlength="90" placeholder="Например: Крыши и парадные Петербурга"></div>

      <div class="field wide"><label for="c-short">Краткое описание *</label>
        <input id="c-short" maxlength="140" placeholder="Одно-два предложения для карточки в каталоге"></div>

      <div class="field wide"><label for="c-full">Полное описание *</label>
        <textarea id="c-full" rows="5" placeholder="Маршрут, что увидят участники, что взять с собой…"></textarea></div>

      <div class="field"><label for="c-country">Страна *</label>
        <input id="c-country" placeholder="Россия"></div>
      <div class="field"><label for="c-city">Город или район *</label>
        <input id="c-city" placeholder="Санкт-Петербург"></div>

      <div class="field"><label for="c-format">Формат *</label>
        <select id="c-format">
          <option>Групповая</option><option>Индивидуальная</option><option>Самостоятельная</option>
        </select></div>
      <div class="field"><label for="c-duration">Длительность *</label>
        <input id="c-duration" placeholder="Например: 3 часа"></div>

      <div class="field" id="groupSizeField"><label for="c-groupsize">Размер группы *</label>
        <input type="number" id="c-groupsize" min="2" placeholder="До скольки человек"></div>
      <div class="field"><label for="c-kids">Дети</label>
        <select id="c-kids"><option value="yes">Можно с детьми</option><option value="no">Только взрослые</option></select></div>

      <div class="field"><label for="c-transport">Способ передвижения *</label>
        <select id="c-transport"><option>Пешком</option><option>Автобусом</option><option>На автомобилях группы</option></select></div>
      <div class="field"><label for="c-price">Стоимость за человека, ₽ *</label>
        <input type="number" id="c-price" min="0" placeholder="2500"></div>

      <div class="field wide"><label for="c-contacts">Контакты создателя *</label>
        <input id="c-contacts" placeholder="Имя · телефон · почта или @ник">
        <div class="hint">Гость получит их на почту после подтверждения брони</div></div>
      <div class="field wide"><label for="c-notify-email">Email для уведомлений о бронированиях</label>
        <input type="email" id="c-notify-email" placeholder="you@example.com">
        <div class="hint">Сюда будут приходить заявки на бронирование этой экскурсии. Если не указать или указать некорректный — уведомления получит администратор сервиса</div></div>

      <div class="field wide"><label>Доступное время (необязательно)</label>
        <div class="slot-list" id="slotList"></div>
        <div class="row-gap">
          <input type="datetime-local" id="c-slot" class="slot-input">
          <button class="btn btn-ghost mini" id="addSlotBtn" type="button">Добавить время</button>
        </div>
        <div class="hint">Если время не задано, экскурсия бронируется в свободном формате.</div></div>
    </div>
    <button class="btn btn-primary btn-block mt-20" id="publishBtn" type="button">Опубликовать экскурсию</button>
  </section>
</template>

<template id="tpl-added-slot">
  <div class="row">
    <span class="slot sel slot-static" data-field="time"></span>
    <button class="btn btn-ghost mini" data-action="remove" type="button">Убрать</button>
  </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/cover.js"></script>
<script src="js/format.js"></script>
<script src="js/emailjs.js"></script>
<script src="js/seed.js"></script>
<script src="js/modal.js"></script>
<script src="js/city.js"></script>
<script src="js/catalog.js"></script>
<script src="js/detail.js"></script>
<script src="js/mail.js"></script>
<script src="js/bookings.js"></script>
<script src="js/mail-view.js"></script>
<script src="js/requests.js"></script>
<script src="js/create.js"></script>
<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>

</body>
</html>
